<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | Raj Thakur</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.thankyou-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.thankyou-card{
    max-width:700px;
    width:100%;
    text-align:center;
    background:#fff;
    padding:60px 40px;
    border-radius:25px;
    box-shadow:0 15px 50px rgba(0,0,0,.08);
}

.success-icon{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    margin-bottom:25px;
}

.thankyou-card h1{
    font-size:48px;
    margin-bottom:15px;
}

.thankyou-card p{
    color:#666;
    font-size:18px;
    line-height:1.8;
    margin-bottom:30px;
}

.home-btn{
    display:inline-block;
    padding:14px 30px;
    background:#111;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    transition:.3s;
}

.home-btn:hover{
    background:#333;
}

@media(max-width:768px){

.thankyou-card{
    padding:40px 25px;
}

.thankyou-card h1{
    font-size:36px;
}

.thankyou-card p{
    font-size:16px;
}

}

</style>

</head>
<body>

<section class="thankyou-page">

    <div class="thankyou-card">

        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1>Thank You!</h1>

        <p>
            Your message has been sent successfully.
            I appreciate you reaching out and will get back
            to you as soon as possible.
        </p>

        <a href="index.html" class="home-btn">
            Back To Home
        </a>

    </div>

</section>

</body>
</html>
